<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سياق العربي | Contexto Arab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-card">
    <header>
        <h1>🔍 سياق العربي</h1>
        <div class="archive-zone">
            <span>لغز يوم: </span>
            <input type="date" id="datePicker">
        </div>
    </header>

    <main id="gameUI">
        <input type="text" id="wordInput" placeholder="اكتب كلمتك هنا..." autocomplete="off">
        <button class="main-btn" id="guessBtn">تحليل الكلمة</button>
        
        <div class="action-btns">
            <button class="sec-btn btn-hint" id="hintBtn">💡 تلميح</button>
            <button class="sec-btn btn-giveup" id="surrenderBtn">🏳️ استسلام</button>
        </div>
    </main>

    <section class="history-list" id="history"></section>
</div>

<script src="script.js"></script>
</body>
</html>
