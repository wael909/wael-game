<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سياق | Contexto Arab</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --primary: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 20px;
        }

        .game-card {
            width: 90%;
            max-width: 450px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--text);
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .mode-btn.active {
            background: var(--primary);
        }

        .input-group {
            margin-top: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #334155;
            color: white;
            font-size: 1.2rem;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: center;
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #1d4ed8;
        }

        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1d4ed8; }

        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .sec-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-hint { background: var(--warning); }
        .btn-giveup { background: var(--danger); }

        .history-list {
            margin-top: 30px;
            max-height: 300px;
            overflow-y: auto;
        }

        .word-row {
            display: flex;
            justify-content: space-between;
            background: #334155;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .status-dot { width: 15px; height: 15px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<div class="game-card">
    <h2 style="margin-top:0;">🔍 سياق العربي</h2>
    
    <div class="mode-selector">
        <button class="mode-btn active" id="offlineBtn" onclick="setMode('offline')">أوفلاين (قهوة)</button>
        <button class="mode-btn" id="onlineBtn" onclick="setMode('online')">أونلاين (قريباً)</button>
    </div>

    <div id="archiveZone">
        <label>لغز يوم: </label>
        <input type="date" id="dateSelector" style="background:#334155; color:white; border:none; padding:5px; border-radius:5px;">
    </div>

    <div class="input-group">
        <input type="text" id="guessInput" placeholder="أدخل كلمة..." autofocus>
        <button class="main-btn" onclick="checkWord()">تحليل الكلمة</button>
    </div>

    <div class="action-btns">
        <button class="sec-btn btn-hint" onclick="showHint()">💡 مساعدة</button>
        <button class="sec-btn btn-giveup" onclick="surrender()">🏳️ استسلام</button>
    </div>

    <div class="history-list" id="results">
        </div>
</div>

<script>
    // التوكن متاعك
    const API_TOKEN = "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";
    const TARGET_WORD = "الجزائر"; // هذي الكلمة السرية توة، نبرمجوا تبديلها لاحقا

    function setMode(mode) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        if(mode === 'online') {
            alert("مود الأونلاين قيد التطوير، العب أوفلاين توة!");
            document.getElementById('offlineBtn').classList.add('active');
        } else {
            document.getElementById('offlineBtn').classList.add('active');
        }
    }

    async function checkWord() {
        const input = document.getElementById('guessInput');
        const word = input.value.trim();
        if(!word) return;

        // استدعاء Hugging Face API للتشابه اللغوي
        try {
            const response = await fetch("https://api-inference.huggingface.co/models/sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2", {
                headers: { Authorization: `Bearer ${API_TOKEN}` },
                method: "POST",
                body: JSON.stringify({ inputs: { source_sentence: TARGET_WORD, sentences: [word] } }),
            });
            const data = await response.json();
            const score = Math.round(data[0] * 1000); // تحويل النتيجة لرقم بين 0 و 1000

            updateResults(word, score);
        } catch (e) {
            alert("مشكلة في الاتصال بالـ API");
        }

        input.value = '';
        input.focus(); // باش تطلع الكلافيي طول
    }

    function updateResults(word, score) {
        const results = document.getElementById('results');
        let color = "var(--danger)";
        if(score > 700) color = "var(--success)";
        else if(score > 400) color = "var(--warning)";

        const html = `
            <div class="word-row">
                <span>${word}</span>
                <span><span class="status-dot" style="background:${color}"></span> ${score}</span>
            </div>
        `;
        results.insertAdjacentHTML('afterbegin', html);
    }

    function surrender() {
        alert("خسرت! الكلمة كانت: " + TARGET_WORD);
    }

    function showHint() {
        alert("تلميح: دولة عربية كبيرة!");
    }

    // تعيين تاريخ اليوم تلقائياً
    document.getElementById('dateSelector').valueAsDate = new Date();
</script>

</body>
</html>
