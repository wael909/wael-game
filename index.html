<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سياق العربي | Contexto Arab</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --primary: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-card {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; border: 2px solid var(--primary); background: transparent; color: var(--text); border-radius: 10px; cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: var(--primary); }

        .archive-zone { margin: 15px 0; background: #334155; padding: 10px; border-radius: 10px; }
        input[type="date"] { background: transparent; color: white; border: none; font-size: 1rem; cursor: pointer; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #1d4ed8;
        }
        .main-btn:disabled { background: #475569; box-shadow: none; cursor: not-allowed; }

        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .sec-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; }
        .btn-hint { background: var(--warning); }
        .btn-giveup { background: var(--danger); }

        .history-list { margin-top: 25px; max-height: 400px; overflow-y: auto; }
        .word-row {
            display: flex;
            justify-content: space-between;
            background: #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-right: 8px solid var(--danger);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .rank-box { font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="game-card">
    <h1 style="margin:0 0 10px 0; font-size: 1.8rem;">🔍 سياق العربي</h1>
    
    <div class="mode-selector">
        <button class="mode-btn active">أوفلاين (القهوة)</button>
        <button class="mode-btn" onclick="alert('الأونلاين قادم قريباً!')">أونلاين</button>
    </div>

    <div class="archive-zone">
        <span>لغز يوم: </span>
        <input type="date" id="datePicker" onchange="initGame()">
    </div>

    <div id="gameUI">
        <input type="text" id="wordInput" placeholder="اكتب كلمتك هنا..." autocomplete="off">
        <button class="main-btn" id="guessBtn" onclick="processGuess()">تحليل الكلمة</button>
        
        <div class="action-btns">
            <button class="sec-btn btn-hint" onclick="getHint()">💡 تلميح</button>
            <button class="sec-btn btn-giveup" onclick="surrender()">🏳️ استسلام</button>
        </div>
    </div>

    <div class="history-list" id="history"></div>
</div>

<script>
    // التوكن الجديد متاعك مقسوم للحماية
    const p1 = "hf_pSQepoiciNBeVner";
    const p2 = "WMUakurecVXC";
    const p3 = "CpTUZO";
    const AUTH = p1 + p2 + p3;

    // كلمات يومية
    const DAILY_WORDS = ["مدرسة", "هاتف", "بحر", "قهوة", "تونس", "سيارة", "كتاب", "طائرة", "مزرعة", "قلم", "سلام", "جامعة", "خبز"];
    let currentSecretWord = "";

    window.onload = () => {
        document.getElementById('datePicker').valueAsDate = new Date();
        initGame();
    };

    function initGame() {
        const dateStr = document.getElementById('datePicker').value;
        const dateSeed = new Date(dateStr).getDate() % DAILY_WORDS.length;
        currentSecretWord = DAILY_WORDS[dateSeed];
        document.getElementById('history').innerHTML = ""; 
        console.log("الكلمة المختارة:", currentSecretWord);
    }

    async function processGuess() {
        const input = document.getElementById('wordInput');
        const guess = input.value.trim();
        const btn = document.getElementById('guessBtn');
        
        if (!guess) return;
        if (guess === currentSecretWord) {
            alert("🎉 مبروووك! لقيت الكلمة الصحيحة!");
            addResult(guess, 1000, "var(--success)");
            input.value = "";
            return;
        }

        btn.disabled = true;
        btn.innerText = "جاري التحليل...";

        try {
            const response = await fetch("https://api-inference.huggingface.co/models/sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2", {
                headers: { 
                    "Authorization": `Bearer ${AUTH}`,
                    "Content-Type": "application/json"
                },
                method: "POST",
                body: JSON.stringify({ 
                    inputs: { source_sentence: currentSecretWord, sentences: [guess] },
                    options: { wait_for_model: true } 
                }),
            });
            
            const data = await response.json();
            
            if (response.ok && Array.isArray(data)) {
                const score = Math.round(data[0] * 1000);
                let color = "var(--danger)";
                if (score > 750) color = "var(--success)";
                else if (score > 450) color = "var(--warning)";
                addResult(guess, score, color);
            } else {
                alert("المحرك قاعد يفتح.. عاود جرب توّة!");
            }
        } catch (e) {
            alert("فمة مشكلة في الربط.. عاود بعد لحظة!");
        }

        btn.disabled = false;
        btn.innerText = "تحليل الكلمة";
        input.value = "";
        input.focus();
    }

    function addResult(word, score, color) {
        const history = document.getElementById('history');
        const item = `
            <div class="word-row" style="border-right-color: ${color}">
                <span style="font-size:1.2rem">${word}</span>
                <span class="rank-box">${score}</span>
            </div>
        `;
        history.insertAdjacentHTML('afterbegin', item);
    }

    function surrender() {
        alert("الكلمة كانت: " + currentSecretWord);
        initGame();
    }

    function getHint() {
        alert("الكلمة تبدأ بحرف: " + currentSecretWord[0]);
    }
</script>

</body>
</html>
